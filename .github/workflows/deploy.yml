name: Deploy Mr Tunde's Task Manager Application to Elastic Beanstalk

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EB_APP_NAME: task-manager-application
  EB_ENV_NAME: task-manager-env
  S3_BUCKET: tunde-task-manager-deployments

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci --production

      - name: Create deployment package
        run: zip -r deploy.zip . -x "*.git*"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          VERSION_LABEL="task-manager-${{ github.sha }}-$(date +%s)"
          aws s3 cp deploy.zip s3://${{ env.S3_BUCKET }}/$VERSION_LABEL.zip
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APP_NAME }} \
            --version-label ${{ env.VERSION_LABEL }} \
            --source-bundle S3Bucket=${{ env.S3_BUCKET }},S3Key=${{ env.VERSION_LABEL }}.zip

      - name: Deploy to EB
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APP_NAME }} \
            --environment-name ${{ env.EB_ENV_NAME }} \
            --version-label ${{ env.VERSION_LABEL }}

      - name: Wait for deployment
        run: |
          echo "Waiting for environment to finish updating..."
          TIMEOUT=900
          INTERVAL=20
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name ${{ env.EB_APP_NAME }} \
              --environment-names ${{ env.EB_ENV_NAME }} \
              --query "Environments[0].Status" \
              --output text)
            echo "Status: $STATUS (${ELAPSED}s elapsed)"
            if [ "$STATUS" = "Ready" ]; then
              echo "Deployment complete."
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Timed out waiting for environment to become Ready."
          exit 1
